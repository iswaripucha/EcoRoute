<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Eco-Route</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #F7FFFB 0%, #E8F7F1 50%, #F0F9F5 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 500px;
    }

    .card {
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
      padding: 40px 30px;
      border: 1px solid rgba(47, 125, 79, 0.1);
    }

    .logo {
      font-size: 48px;
      margin-bottom: 16px;
      text-align: center;
    }

    h1 {
      color: #1a1a1a;
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 8px;
      text-align: center;
    }

    .subtitle {
      color: #666;
      font-size: 14px;
      text-align: center;
      margin-bottom: 30px;
    }

    .message {
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 20px;
      font-size: 13px;
      display: none;
    }

    .message.error {
      display: block;
      background: #FFF5F5;
      color: #E74C3C;
      border: 1px solid #FFE0E0;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 8px;
      font-size: 14px;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      transition: all 0.2s;
    }

    input:focus {
      outline: none;
      border-color: #2F7D4F;
      box-shadow: 0 0 0 4px rgba(47, 125, 79, 0.1);
    }

    .password-field {
      position: relative;
    }

    .toggle-password {
      position: absolute;
      right: 12px;
      top: 42px;
      background: none;
      border: none;
      color: #666;
      cursor: pointer;
      font-size: 18px;
      padding: 4px 8px;
      transition: all 0.2s;
    }

    .toggle-password:hover {
      color: #2F7D4F;
    }

    .forgot-password {
      text-align: right;
      margin-bottom: 16px;
    }

    .forgot-password a {
      color: #2F7D4F;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
    }

    .forgot-password a:hover {
      text-decoration: underline;
    }

    .divider {
      display: flex;
      align-items: center;
      margin: 24px 0;
      gap: 12px;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: #e0e0e0;
    }

    .divider-text {
      color: #999;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .button-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    button {
      width: 100%;
      padding: 12px 20px;
      border-radius: 10px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .btn-login {
      background: linear-gradient(135deg, #2F7D4F 0%, #25634A 100%);
      color: white;
    }

    .btn-login:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(47, 125, 79, 0.3);
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-google {
      background: white;
      color: #1a1a1a;
      border: 2px solid #e0e0e0;
    }

    .btn-google:hover {
      border-color: #4285f4;
      background: #f8f9fa;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(66, 133, 244, 0.2);
    }

    .btn-icon {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .footer {
      text-align: center;
      color: #999;
      font-size: 13px;
      margin-top: 24px;
    }

    .footer a {
      color: #2F7D4F;
      text-decoration: none;
      font-weight: 600;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .card {
        padding: 30px 20px;
      }

      h1 {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <!-- Header -->
      <div class="logo">🌍</div>
      <h1>Welcome Back</h1>
      <p class="subtitle">Login to continue your eco journey</p>

      <!-- Message -->
      <div id="message" class="message"></div>

      <!-- Email/Password Login Form -->
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            placeholder="you@example.com"
            required
          >
        </div>

        <div class="form-group password-field">
          <label for="password">Password</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            placeholder="••••••••"
            required
          >
          <button type="button" class="toggle-password" onclick="togglePasswordVisibility()">👁️</button>
        </div>

        <div class="forgot-password">
          <a href="#">Forgot password?</a>
        </div>

        <button type="submit" class="btn-login">Login</button>
      </form>

      <!-- Divider -->
      <div class="divider">
        <div class="divider-line"></div>
        <div class="divider-text">or</div>
        <div class="divider-line"></div>
      </div>

      <!-- Google Sign-In -->
      <button class="btn-google" onclick="window.location.href='http://127.0.0.1:5000/login/google'">
        <span class="btn-icon">
          <svg viewBox="0 0 24 24" style="width:100%;height:100%;">
            <path fill="#EA4335" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#4285F4" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#FBBC05" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
        </span>
        Continue with Google
      </button>

      <!-- Footer -->
      <div class="footer">
        <p>Don't have an account? 
          <a href="/entry">Create one here</a>
        </p>
      </div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
  <script>
    function togglePasswordVisibility() {
      const passwordInput = document.getElementById('password');
      const btn = event.target;
      
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        btn.textContent = '🙈';
      } else {
        passwordInput.type = 'password';
        btn.textContent = '👁️';
      }
    }

    function showMessage(message, type = 'error') {
      const msgEl = document.getElementById('message');
      msgEl.textContent = message;
      msgEl.className = `message ${type}`;
    }

    function handleLogin(event) {
      event.preventDefault();

      const email = document.getElementById('email').value.trim().toLowerCase();
      const password = document.getElementById('password').value;

      // Get users from localStorage
      const users = JSON.parse(localStorage.getItem('ecoroute_users') || '{}');

      // Debug: Log stored users
      console.log('Users in storage:', users);
      console.log('Checking email:', email);
      
      // Check if user exists and password matches
      if (!users[email]) {
        showMessage('Email not found. Please check or create a new account.', 'error');
        return;
      }

      // Compare passwords (trim both for safety)
      const storedPassword = (users[email].password || '').trim();
      const enteredPassword = password.trim();
      
      console.log('Stored password:', storedPassword);
      console.log('Entered password:', enteredPassword);
      
      if (storedPassword !== enteredPassword) {
        showMessage('Invalid password. Please try again.', 'error');
        return;
      }

      // Login successful
      const user = users[email];
      const currentUser = {
        name: user.name,
        email: user.email,
        dob: user.dob,
        authMethod: 'email',
        profileCompleted: user.profileCompleted !== false,
        preferences: user.preferences || { priority: 'eco' }
      };

      localStorage.setItem('ecoroute_user', JSON.stringify(currentUser));

      // Redirect based on profile completion
      if (!currentUser.profileCompleted) {
        window.location.href = '/profile';
      } else {
        window.location.href = '/dashboard';
      }
    }

    // No-op: Google login redirects to backend OAuth start endpoint
  </script>

  <!-- Google Sign-In SDK -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</body>
</html>
