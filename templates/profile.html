<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile | Eco-Route</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
  <style>
    .profile-header {
      background: linear-gradient(90deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      padding: 16px 0;
      box-shadow: var(--shadow);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .profile-header .header-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .profile-header h1 {
      font-size: 22px;
      font-weight: 700;
      margin: 0;
    }
    .back-btn {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.25);
      color: white;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer !important;
      font-weight: 600;
      font-size: 13px;
      transition: all 0.2s ease;
      pointer-events: auto !important;
      position: relative;
      z-index: 110;
    }
    .back-btn:hover {
      background: rgba(255,255,255,0.25);
      transform: translateY(-1px);
    }
    .profile-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 30px 20px;
    }
    .profile-section {
      background: var(--bg-card);
      padding: 24px;
      border-radius: 12px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      margin-bottom: 24px;
    }
    .profile-section h2 {
      font-size: 18px;
      color: var(--text-dark);
      margin-bottom: 16px;
      font-weight: 700;
    }
    .form-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 16px;
    }
    .form-group {
      display: flex;
      flex-direction: column;
    }
    .form-group label {
      font-weight: 600;
      color: var(--text-dark);
      margin-bottom: 8px;
      font-size: 14px;
    }
    .form-group input,
    .form-group select {
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      transition: all 0.2s ease;
    }
    .form-group input:disabled {
      background: var(--bg-light);
      color: var(--text-muted);
      cursor: not-allowed;
    }
    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(47, 125, 79, 0.1);
    }
    .form-group.readonly {
      color: var(--text-muted);
    }
    .readonly-note {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }
    .button-group {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }
    .btn-save {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer !important;
      transition: all 0.2s ease;
      pointer-events: auto !important;
      position: relative;
      z-index: 10;
    }
    .btn-save:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(47, 125, 79, 0.2);
    }
    .btn-cancel {
      background: var(--bg-light);
      color: var(--text-dark);
      border: 1px solid var(--border);
      padding: 12px 24px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer !important;
      transition: all 0.2s ease;
      pointer-events: auto !important;
      position: relative;
      z-index: 10;
    }
    .btn-cancel:hover {
      background: rgba(47, 125, 79, 0.05);
    }
    .completion-bar {
      background: var(--bg-light);
      height: 8px;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .completion-fill {
      background: linear-gradient(90deg, var(--primary), var(--accent));
      height: 100%;
      transition: width 0.3s ease;
    }
    .completion-text {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <!-- HEADER -->
  <header class="profile-header">
    <div class="header-container">
      <h1>🌍 Eco-Route</h1>
      <button class="back-btn" type="button" onclick="try { console.log('Back button clicked'); window.location.href='/dashboard'; } catch(e) { console.error('Back button error:', e); }">← Back to Dashboard</button>
    </div>
  </header>

  <!-- PROFILE CONTAINER -->
  <div class="profile-container">
    <div class="profile-section">
      <h2>Your Profile</h2>
      <div class="completion-bar">
        <div id="completionFill" class="completion-fill" style="width: 0%;"></div>
      </div>
      <div id="completionText" class="completion-text">Profile 0% complete</div>
    </div>

    <!-- Section 1: Basic Info (Read-only) -->
    <div class="profile-section">
      <h2>📋 Basic Information</h2>
      <p style="font-size:13px; color:var(--text-muted); margin-bottom:16px;">These details are locked for security and cannot be modified.</p>
      
      <div class="form-row">
        <div class="form-group">
          <label for="nameInput">Full Name</label>
          <input type="text" id="nameInput" disabled>
          <div class="readonly-note">🔒 Cannot be edited</div>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="emailInput">Email Address</label>
          <input type="email" id="emailInput" disabled>
          <div class="readonly-note">🔒 Cannot be edited</div>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="dobInput">Date of Birth</label>
          <input type="date" id="dobInput" disabled>
          <div class="readonly-note">🔒 Cannot be edited</div>
        </div>
      </div>
    </div>

    <!-- Section 2: Contact Details (Editable) -->
    <div class="profile-section">
      <h2>📞 Contact Details</h2>

      <div class="form-row">
        <div class="form-group">
          <label for="phoneInput">Phone Number</label>
          <input type="tel" id="phoneInput" placeholder="e.g., +91 9876543210">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="addressInput">Address</label>
          <input type="text" id="addressInput" placeholder="e.g., 123 Main Street">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="cityInput">City</label>
          <input type="text" id="cityInput" placeholder="e.g., New York">
        </div>
        <div class="form-group">
          <label for="stateInput">State</label>
          <input type="text" id="stateInput" placeholder="e.g., NY">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="countryInput">Country</label>
          <input type="text" id="countryInput" placeholder="e.g., USA">
        </div>
        <div class="form-group">
          <label for="pincodeInput">Postal Code</label>
          <input type="text" id="pincodeInput" placeholder="e.g., 10001">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="emergencyInput">Emergency Contact</label>
          <input type="text" id="emergencyInput" placeholder="e.g., +91 9876543210">
        </div>
      </div>
    </div>

    <!-- Section 3: Preferences (Editable) -->
    <div class="profile-section">
      <h2>🌱 Travel Preferences</h2>

      <div class="form-row">
        <div class="form-group">
          <label for="transportInput">Preferred Transport Mode</label>
          <select id="transportInput">
            <option value="">-- No preference --</option>
            <option value="walk">🚶 Walking</option>
            <option value="cycle">🚴 Cycling</option>
            <option value="bus">🚌 Public Bus</option>
            <option value="train">🚆 Train</option>
            <option value="carpool">🚗 Carpool</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="priorityInput">Travel Priority</label>
          <select id="priorityInput">
            <option value="eco">🌱 Eco-Friendly</option>
            <option value="cost">💰 Low Cost</option>
            <option value="time">⚡ Fastest</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="button-group">
      <button class="btn-save" type="button" onclick="try { console.log('Save button clicked'); saveProfile(); } catch(e) { console.error('Save button error:', e); alert('Error: ' + e.message); }">Save Changes</button>
      <button class="btn-cancel" type="button" onclick="try { console.log('Cancel button clicked'); window.location.href='/dashboard'; } catch(e) { console.error('Cancel button error:', e); }">Cancel</button>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
  <script src="{{ url_for('static', filename='js/profile.js') }}"></script>
</body>
</html>
